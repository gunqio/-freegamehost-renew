name: FGH-Renew
on:
  workflow_dispatch:
  schedule:
    - cron: '30 2,6,10,14,18,22 * * *'
jobs:
  run_fgh_renew:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 检出当前仓库
        uses: actions/checkout@v4

      - name: 🔐 克隆私库 gunqio/zhiyong
        run: |
          git clone https://x-access-token:${{ secrets.PRIVATE_REPO_PAT }}@github.com/gunqio/zhiyong.git private_repo
          cp private_repo/freegamehost.py freegamehost.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # ========== 移除 GOST 下载步骤 ==========
      # 原 "🛠️ 下载 GOST" 步骤已删除

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase requests
          seleniumbase install chromedriver

      # ========== 新增：Xray 代理转发 ==========
      - name: 🛡️ 启动 Xray 代理转发
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          if [ -z "$XRAY_CONFIG" ]; then
            echo "⚠️ 未配置 XRAY_CONFIG，跳过 Xray 代理启动"
          else
            echo "📦 正在下载并配置 Xray..."
            wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
            unzip -q Xray-linux-64.zip -d xray_bin
            chmod +x xray_bin/xray
            
            echo "$XRAY_CONFIG" > xray_bin/config.json
            
            nohup ./xray_bin/xray run -c ./xray_bin/config.json > xray.log 2>&1 &
            sleep 4
            
            echo "🌐 测试通过代理获取的出口 IP:"
            curl -s -x socks5h://127.0.0.1:10808 https://api.ipify.org || echo "⚠️ 代理测试超时或失败，但将继续执行"
            echo -e "\n✅ Xray 代理服务已就绪"
          fi
      # ========================================

      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          FGH_ACCOUNT: ${{ secrets.FGH_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}   # 传递给脚本供内部判断
        run: |
          # 如果配置了 XRAY_CONFIG，则启用代理并设置标准代理环境变量
          if [ -n "$XRAY_CONFIG" ]; then
            export USE_PROXY="true"
            export ALL_PROXY="socks5://127.0.0.1:10808"
            export HTTP_PROXY="socks5://127.0.0.1:10808"
            export HTTPS_PROXY="socks5://127.0.0.1:10808"
            echo "🌐 代理已激活（Xray），准备通过节点续期..."
          else
            export USE_PROXY="false"
            echo "⚠️ 未使用 Xray 代理模式"
          fi
          # 注意：原 GOST_PROXY 环境变量已移除
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python freegamehost.py

      - name: 📸 上传截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
