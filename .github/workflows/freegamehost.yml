name: FGH-Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '30 2,6,10,14,18,22 * * *'

jobs:
  run_fgh_renew:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 📥 检出当前仓库
        uses: actions/checkout@v4

      - name: 🔐 克隆私库 gunqio/zhiyong
        run: |
          git clone https://x-access-token:${{ secrets.PRIVATE_REPO_PAT }}@github.com/gunqio/zhiyong.git private_repo
          cp private_repo/freegamehost.py freegamehost.py

      - name: 🐍 设置 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 🛠️ 安装系统依赖
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            google-chrome-stable \
            xvfb \
            x11-utils \
            xdotool \
            scrot \
            netcat-openbsd

      - name: 🐍 安装 Python 依赖
        run: |
          pip install seleniumbase requests pysocks
          seleniumbase install chromedriver

      # ========== Xray 代理转发（带诊断） ==========
      - name: 🛡️ 启动 Xray 代理转发
        env:
          XRAY_CONFIG: ${{ secrets.XRAY_CONFIG }}
        run: |
          if [ -z "$XRAY_CONFIG" ]; then
            echo "⚠️ 未配置 XRAY_CONFIG，跳过 Xray 代理启动"
            echo "XRAY_READY=false" >> $GITHUB_ENV
            exit 0
          fi

          echo "📦 正在下载并配置 Xray..."
          wget -q https://github.com/XTLS/Xray-core/releases/latest/download/Xray-linux-64.zip
          if [ $? -ne 0 ]; then
            echo "❌ Xray 下载失败，将使用直连"
            echo "XRAY_READY=false" >> $GITHUB_ENV
            exit 0
          fi

          unzip -q Xray-linux-64.zip -d xray_bin
          chmod +x xray_bin/xray

          echo "$XRAY_CONFIG" > xray_bin/config.json

          nohup ./xray_bin/xray run -c ./xray_bin/config.json > xray.log 2>&1 &
          sleep 5

          echo "===== Xray 日志内容 ====="
          cat xray.log
          echo "========================="

          if pgrep -f "xray_bin/xray" > /dev/null; then
            echo "✅ Xray 进程正在运行"
          else
            echo "❌ Xray 进程未找到，可能启动失败"
            echo "XRAY_READY=false" >> $GITHUB_ENV
            exit 0
          fi

          if nc -zv 127.0.0.1 10808 2>/dev/null; then
            echo "✅ Xray 代理端口 10808 已监听"
            echo "XRAY_READY=true" >> $GITHUB_ENV
          else
            echo "❌ Xray 端口 10808 未监听，将使用直连"
            echo "XRAY_READY=false" >> $GITHUB_ENV
          fi
      # ==========================================

      - name: 🚀 运行脚本
        env:
          PYTHONIOENCODING: utf-8
          FGH_ACCOUNT: ${{ secrets.FGH_ACCOUNT }}
          TG_BOT: ${{ secrets.TG_BOT }}
          XRAY_READY: ${{ env.XRAY_READY }}
        run: |
          if [ "$XRAY_READY" = "true" ]; then
            export USE_PROXY="true"
            export ALL_PROXY="socks5://127.0.0.1:10808"
            export HTTP_PROXY="$ALL_PROXY"
            export HTTPS_PROXY="$ALL_PROXY"
            echo "🌐 代理已激活（Xray），准备通过节点续期..."
          else
            export USE_PROXY="false"
            echo "⚠️ 未使用代理模式（Xray 未就绪或未配置）"
          fi
          xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python freegamehost.py

      - name: 📸 上传调试截图
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-screenshots
          path: "*.png"
          retention-days: 3
